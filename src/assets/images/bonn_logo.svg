<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#000"></rect>

  <!-- Orange band: slope 1:5, pointing upwards -->
  <rect x="-600" y="326" width="2000" height="148" fill="#ff9416" transform="rotate(-11.309932, 400, 400)"></rect>

  <!-- Plaque: 400 x 512 centered -->
  <rect x="200" y="144" width="400" height="512" fill="#000"></rect>

  <!-- Bars: 90 x 410 with snapped margins/gap -->
